<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Liz's Macros</title>
    <link rel="preload" as="image" href="Logo.png">
    <link rel="apple-touch-icon" href="apple-touch-icon.png">
    <link rel="icon" type="image/png" href="favicon.png">
    <link rel="stylesheet" href="style.css">
    <meta name="robots" content="noindex, nofollow">
</head>
<body>

    <header class="app-header">
        <button class="hamburger-menu">☰</button>
        <img src="Logo.png" alt="Liz's Macros Logo" class="header-logo">
        <div class="header-spacer"></div>
    </header>

    <div id="sync-banner" class="sync-banner hidden">Syncing... ⏳</div>

    <div id="menu-overlay" class="menu-overlay"></div>
    <nav id="sidebar" class="sidebar">
        <button id="close-menu" class="close-btn">&times;</button>
        <ul class="menu-links">
            <li><a href="#" data-target="dashboard-page">🏠 Dashboard</a></li>
            <li><a href="#" data-target="streaks-page">🔥 Streaks & Rewards</a></li>
            <li><a href="#" data-target="settings-page">⚙️ Settings</a></li>
        </ul>
    </nav>

    <main id="dashboard-page" class="dashboard page active">
        
        <div class="top-modules">
            
            <section class="floating-module logger-module">
                <div class="date-picker-container">
                    <button class="date-arrow">&lt;</button>
                    <input type="date" id="log-date" class="date-input">
                    <button class="date-arrow">&gt;</button>
                </div>

                <div class="progress-container">
                    <div class="macro-bar-group">
                        <div class="macro-label"><span>Calories</span> <span id="calories-text">0 / 1600</span></div>
                        <div class="macro-track">
                            <div class="macro-fill calories-fill" id="calories-bar" style="width: 0%;"></div>
                            <span class="macro-remaining" id="cal-left"></span>
                        </div>
                    </div>
                    <div class="macro-bar-group">
                        <div class="macro-label"><span>Protein</span> <span id="protein-text">0 / 115g</span></div>
                        <div class="macro-track">
                            <div class="macro-fill protein-fill" id="protein-bar" style="width: 0%;"></div>
                            <span class="macro-remaining" id="pro-left"></span>
                        </div>
                    </div>
                    <div class="macro-bar-group">
                        <div class="macro-label"><span>Carbs</span> <span id="carbs-text">0 / 140g</span></div>
                        <div class="macro-track">
                            <div class="macro-fill carbs-fill" id="carbs-bar" style="width: 0%;"></div>
                            <span class="macro-remaining" id="carb-left"></span>
                        </div>
                    </div>
                    <div class="macro-bar-group">
                        <div class="macro-label"><span>Fat</span> <span id="fat-text">0 / 55g</span></div>
                        <div class="macro-track">
                            <div class="macro-fill fat-fill" id="fat-bar" style="width: 0%;"></div>
                            <span class="macro-remaining" id="fat-left"></span>
                        </div>
                    </div>

                <h2>Log a Meal</h2>
                <form id="macro-form">
                    <input type="text" placeholder="Food Name (Required)" required>
                    <input type="number" placeholder="Servings (Required)" required step="any">
                    <div class="macro-grid">
                        <input type="number" placeholder="Calories" step="any">
                        <input type="number" placeholder="Protein (g)" step="any">
                        <input type="number" placeholder="Carbs (g)" step="any">
                        <input type="number" placeholder="Fat (g)" step="any">
                        <input type="number" placeholder="Sugar (g)" step="any">
                    </div>
                    <button type="submit" class="submit-btn">Log It!</button>
                </form>
            </section>

            <section class="floating-module top-ten-module">
                <h2>Top Logged Foods</h2>
                <ul class="top-ten-list">
                    </ul>
            </section>

        </div> <section class="floating-module history-module" style="margin-top: 20px;">
            <h2>30-Day Log History</h2>
            <div id="history-container">
                </div>
        </section>

    </main>

    <main id="streaks-page" class="dashboard page">
        <section class="floating-module text-center">
            <h2>Current Streak</h2>
            <div class="streak-display">
                <span id="current-streak-count">0</span>
                <p>Days in a row!</p>
            </div>
        </section>

        <section class="floating-module rewards-module" style="margin-top: 20px;">
            <h2>Logging Streaks</h2>
            <div class="rewards-timeline" id="rewards-timeline">
                </div>
        </section>

        <section class="floating-module text-center" style="margin-top: 20px;">
            <h2>Days Goal Met</h2>
            <div class="streak-display">
                <span id="goal-met-count" style="color: #A1C4FD;">0</span>
                <p>Total perfect days!</p>
            </div>
        </section>
    </main>

    <main id="settings-page" class="dashboard page">
        <section class="floating-module settings-module">
            <h2>Daily Goals</h2>
            <form id="settings-form">
                <label>Calories</label>
                <input type="number" id="goal-calories" placeholder="e.g., 2000">
                
                <label>Protein (g)</label>
                <input type="number" id="goal-protein" placeholder="e.g., 120">
                
                <label>Carbs (g)</label>
                <input type="number" id="goal-carbs" placeholder="e.g., 150">
                
                <label>Fat (g)</label>
                <input type="number" id="goal-fat" placeholder="e.g., 50">
                
                <button type="submit" class="submit-btn" style="margin-top: 20px; width: 100%;">Save Goals</button>
            </form>
        </section>
    </main>

    <script src="app.js"></script>
</body>
</html>
